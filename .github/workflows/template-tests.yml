name: Template Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  template-tests:
    name: Template infrastructure tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run template tests
        run: .github/template-tests/run.sh
