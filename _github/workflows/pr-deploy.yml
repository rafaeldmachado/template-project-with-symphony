name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # ── Project-specific setup ──────────────────────────
      # TODO: Uncomment and configure for your deploy provider
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '22'
      #     cache: 'npm'
      # - run: npm ci && npm run build

      - name: Deploy preview
        id: deploy
        run: |
          ./scripts/deploy/pr-preview.sh ${{ github.event.pull_request.number }}
        env:
          DEPLOY_PROVIDER: ${{ vars.DEPLOY_PROVIDER }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_PROJECT_ID: ${{ vars.DEPLOY_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const urlFile = '.deploy-artifacts/preview-url.txt';
            let url = 'Preview deploy skipped (no DEPLOY_PROVIDER configured)';
            if (fs.existsSync(urlFile)) {
              url = fs.readFileSync(urlFile, 'utf8').trim();
            }
            const body = `## Preview Deploy\n\n${url}\n\n_Updated at ${new Date().toISOString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Preview Deploy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
