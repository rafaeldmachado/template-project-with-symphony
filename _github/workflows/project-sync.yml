name: Sync Issues to GitHub Project

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, closed, reopened]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, converted_to_draft]

jobs:
  sync-issue:
    name: Sync issue to project board
    if: github.event_name == 'issues' && vars.PROJECT_URL != ''
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.PROJECT_TOKEN }}

  sync-pr:
    name: Sync PR to project board
    if: github.event_name == 'pull_request' && vars.PROJECT_URL != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      repository-projects: write
    steps:
      - name: Add PR to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.PROJECT_TOKEN }}

  update-status:
    name: Update project item status
    if: (github.event.action == 'closed' || github.event.action == 'reopened') && vars.PROJECT_URL != ''
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    steps:
      - name: Update status via GitHub CLI
        run: |
          echo "TODO: Use gh project item-edit to update status field"
          echo "This requires PROJECT_TOKEN with project scope"
          echo "Event: ${{ github.event.action }}"
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}
