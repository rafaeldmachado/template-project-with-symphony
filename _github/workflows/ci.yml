name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Pick runner: prefer self-hosted, fall back to GitHub-hosted ──
  pick-runner:
    name: Pick runner
    runs-on: ubuntu-latest
    permissions:
      administration: read
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for online self-hosted runner
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(gh api "repos/${{ github.repository }}/actions/runners" 2>&1) || RESPONSE=""
          ONLINE=$(echo "$RESPONSE" | jq '[.runners[]? | select(.status == "online")] | length' 2>/dev/null || echo "0")
          if [ "$ONLINE" -gt 0 ]; then
            echo "runner=self-hosted" >> "$GITHUB_OUTPUT"
            echo "Using self-hosted runner"
          else
            echo "runner=ubuntu-latest" >> "$GITHUB_OUTPUT"
            echo "No self-hosted runner online (or insufficient permissions), falling back to ubuntu-latest"
          fi

  checks:
    name: All checks
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - uses: actions/checkout@v4

      # ── Project-specific setup ──────────────────────────
      # TODO: Uncomment and configure for your stack
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '22'
      #     cache: 'npm'
      # - run: npm ci

      - name: Run all checks
        run: ./scripts/checks/run-all.sh
