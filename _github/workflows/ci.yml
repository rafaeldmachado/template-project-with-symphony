name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: All checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Project-specific setup ──────────────────────────
      # TODO: Uncomment and configure for your stack
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '22'
      #     cache: 'npm'
      # - run: npm ci

      - name: Run all checks
        run: ./scripts/checks/run-all.sh
