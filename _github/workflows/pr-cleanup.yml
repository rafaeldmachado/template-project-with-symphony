name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup-preview:
    name: Tear down PR preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup preview deploy
        run: ./scripts/deploy/pr-cleanup.sh ${{ github.event.pull_request.number }}
        env:
          DEPLOY_PROVIDER: ${{ vars.DEPLOY_PROVIDER }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_PROJECT_ID: ${{ vars.DEPLOY_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_ENGINE: ${{ vars.DB_ENGINE }}
          DB_ORM: ${{ vars.DB_ORM }}
